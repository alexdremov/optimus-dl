# FP8 Training Configuration for Llama 2
# Uses state-of-the-art FP8 (E4M3/E5M2) training with Transformer Engine
# Requires: pip install transformer-engine
# Hardware: NVIDIA H100 or B200 GPUs recommended

defaults:
  - defaults.yaml
  - lr_scheduler: wsd
  - model: llama2
  - criterion: cross_entropy
  - loggers: basic
  - optimization/amp: fp8_hybrid  # Use FP8 hybrid mode
  - _self_

_name: base
args:
  name: train-llama2-210M-slimpajama-fp8
  iterations: 33000
  batch_size: 96
  seq_len: 512

model_transforms:
  - _name: fully_shard
  - _name: compile
    compile_kwargs:
      disable: true

lr_scheduler:
  warmup_steps: 300
  warmup_steps_fraction: null

# Experiment configuration
common:
  exp_name: ${args.name}-${config_hash:}
  log_freq: 50
  save_freq: 500
  eval_freq: 200
  eval_iterations: 64
  output_path: ${oc.env:SCRATCH_HOME,.}/outputs/llama2-fp8/${.exp_name}

# Optimization settings
optimization:
  iterations: ${args.iterations}
  acc_steps: 1
  clip_grad_norm: 5.0 # Gradient clipping norm

  # FP8-specific: Gradient scaler is disabled (handled by Transformer Engine)
  amp:
    enabled: true
    dtype: torch.float8_e4m3fn
    enable_scaler: false  # Disabled for FP8
    fp8:
      enabled: true
      format: hybrid  # E4M3 forward, E5M2 backward (recommended)
      margin: 0
      amax_history_len: 1024
      amax_compute_algo: "max"
      reduce_amax: true
      fp8_dpa: false
      fp8_mha: false

  optimizer:
    _name: adamw
    lr: 5e-4 # Base learning rate
    weight_decay: 1e-1
    betas: [0.9, 0.99] # Adam beta parameters
    eps: 1e-8 # Adam epsilon

# Data configuration
data:
  scratch:
    base_transforms:
      _name: compose
      transforms:
        - _name: tokenize
          tokenizer_config:
            _name: tiktoken
            name: gpt2
        - _name: chunk_tokens
          max_seq_len: ${args.seq_len}
        - _name: shuffle
          buffer_size: 8096
        - _name: flat_batcher
          batch_size: ${args.batch_size}
          seq_len: ${args.seq_len}
        - _name: prefetch
        - _name: to_device

  train_datasets:
    report_freq: 500
    profile: false
    source:
      _name: loop
      inner:
        _name: preset_slimpajama6b
        split: train
    transform: ${data.scratch.base_transforms}

  # Evaluation datasets (optional)
  eval_datasets:
    slimpajama6b:
      source:
        _name: preset_slimpajama6b
        split: validation
      transform: ${data.scratch.base_transforms}
