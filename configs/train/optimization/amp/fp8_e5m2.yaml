# FP8 E5M2 Mode Configuration
# Uses E5M2 for all tensors (forward and backward)
# E5M2 has wider dynamic range (5 exponent bits, 2 mantissa bits)
# which is beneficial for gradients but may have lower precision.
# Requires: pip install transformer-engine
# NOTE: Pure E5M2 is NOT supported by TE's DelayedScaling recipe.
# Use hybrid or e4m3 instead.

enabled: true
dtype: torch.float8_e5m2

# Gradient scaler is disabled for FP8 (handled by Transformer Engine)
enable_scaler: false

# FP8-specific configuration
fp8:
  enabled: true
  format: e5m2  # E5M2 for all tensors (NOT supported by DelayedScaling)
  margin: 0
  amax_history_len: 1024
  amax_compute_algo: "max"
  reduce_amax: true
  fp8_dpa: false
  fp8_mha: false
