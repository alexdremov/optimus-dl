name: Update uv.lock

on:
  pull_request:
    branches: ["main"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_lock:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-test')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Update uv.lock
        env:
          GROUPED_GEMM_SKIP_CUDA_BUILD: TRUE
          UV_CACHE_DIR: /tmp/.uv-cache
          SETUPTOOLS_SCM_PRETEND_VERSION: 1.0.0
        run: |
          uv lock

      - name: Commit back (if changed)
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
        with:
          commit_message: "chore: update uv.lock"
          branch: ${{ github.head_ref }}
          file_pattern: uv.lock
